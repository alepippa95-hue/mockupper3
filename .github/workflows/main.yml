name: Compila App per Mac Intel

on:
  workflow_dispatch:

jobs:
  build_mac:
    # Usiamo i server veloci macOS 14 (Apple Silicon) per evitare code infinite!
    runs-on: macos-14
    
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python x64 (Intel)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64' # <--- Forza la compilazione Intel compatibile con l'iMac!

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Compila con PyInstaller
        # Cancelliamo vecchi file .spec e compiliamo l'app
        run: |
          rm -f *.spec
          pyinstaller --noconsole --windowed generatore_automatico_cuore.py

      - name: Comprimi l'App con la cartella magliette
        run: |
          # Cerchiamo la cartella modelli_magliette (ignorando maiuscole/minuscole)
          FOLDER=$(find . -maxdepth 1 -type d -iname "*modelli*magliette*" | head -n 1)
          if [ -n "$FOLDER" ]; then
            echo "Cartella magliette trovata: $FOLDER"
            cp -r "$FOLDER" dist/modelli_magliette
          else
            echo "❌ ERRORE: La cartella 'modelli_magliette' non è stata trovata nel tuo repository!"
            echo "Ecco i file presenti su GitHub:"
            ls -la
            exit 1
          fi
          
          # Entriamo nella cartella dist e zippiamo l'App insieme alle magliette
          cd dist
          zip -r App_Mac.zip generatore_automatico_cuore.app modelli_magliette

      - name: Salva il file finale (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac
          path: dist/App_Mac.zip
