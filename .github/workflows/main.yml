name: Compila App per Mac (Universal)

on:
  workflow_dispatch:

jobs:
  build_mac:
    runs-on: macos-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: pip install pyinstaller pillow

      - name: Compila per Mac (Universale)
        # ⚠️ QUI SOTTO: Cancella NOME_DEL_TUO_FILE.py e scrivi il nome esatto del tuo file!
        run: pyinstaller --noconsole --windowed --target-architecture universal2 generatore_automatico_cuore.py

      - name: Comprimi l'App
        run: |
          cd dist
          zip -r App_Mac.zip *.app

      - name: Salva il file finale
        # ✅ QUI ABBIAMO RISOLTO L'ERRORE DI DEPRECAZIONE!
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac
          path: dist/App_Mac.zip
