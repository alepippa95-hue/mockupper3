name: Compila App per Mac

on:
  workflow_dispatch:

jobs:
  build_mac:
    runs-on: macos-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: pip install pyinstaller pillow

      - name: Compila per Mac
        run: pyinstaller --noconsole --windowed generatore_automatico_cuore.py

      - name: Salva il file finale
        uses: actions/upload-artifact@v3
        with:
          name: App-Mac
          path: dist/
