name: Compila App per Mac

on:
  workflow_dispatch:

jobs:
  build_mac:
    runs-on: macos-13
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: pip install pyinstaller pillow

      - name: Compila per Mac
        # Ho rimosso il parametro che faceva crashare Pillow
        run: pyinstaller --noconsole --windowed generatore_automatico_cuore.py

      - name: Comprimi l'App
        run: |
          cd dist
          zip -r App_Mac.zip *.app

      - name: Salva il file finale
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac
          path: dist/App_Mac.zip
