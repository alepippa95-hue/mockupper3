name: Build per Mac Intel (iMac Elisa)

on: [push, workflow_dispatch]

jobs:
  build:
    # Usiamo macOS 14 (Apple Silicon), che parte all'istante
    runs-on: macos-14  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura Python specificando l'architettura x64 (Intel)
      - name: Set up Python x64 (Intel)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Consigliato 3.11 o 3.12 per evitare problemi di librerie su macOS 14
          architecture: 'x64'     # <--- QUESTO FORZA LA COMPILAZIONE INTEL!

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Se hai un file requirements.txt, scommenta la riga sotto:
          # pip install -r requirements.txt

      - name: Build con PyInstaller
        run: |
          # PyInstaller compilerà per x86_64 perché sta girando sotto il Python x64 (Rosetta)
          pyinstaller --onefile il_tuo_script.py

      # Step per caricare l'eseguibile negli Artifacts (opzionale)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Intel-App
          path: dist/
