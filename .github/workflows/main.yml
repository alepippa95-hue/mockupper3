name: Compila App per Mac

on:
  workflow_dispatch:

jobs:
  build_mac:
    # Usiamo macos-13 (Intel) così l'app finale funzionerà sia sui Mac Intel sia sui Mac M1/M2/M3/M4 tramite Rosetta!
    runs-on: macos-13
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: pip install pyinstaller pillow

      - name: Compila per Mac
        # ✅ Cancelliamo qualsiasi file .spec esistente per evitare l'errore "not a fat binary"
        run: |
          rm -f *.spec
          pyinstaller --noconsole --windowed generatore_automatico_cuore.py

      - name: Comprimi l'App con la cartella magliette
        # ✅ Cerchiamo la cartella modelli_magliette in modo intelligente (case-insensitive)
        run: |
          FOLDER=$(find . -maxdepth 1 -type d -iname "*modelli*magliette*" | head -n 1)
          if [ -n "$FOLDER" ]; then
            echo "Cartella magliette trovata: $FOLDER"
            cp -r "$FOLDER" dist/modelli_magliette
          else
            echo "❌ ERRORE: La cartella delle magliette non è stata trovata sul tuo repository GitHub!"
            echo "Ecco i file attualmente presenti nel tuo repository:"
            ls -la
            exit 1
          fi
          cd dist
          zip -r App_Mac.zip *.app modelli_magliette

      - name: Salva il file finale
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac
          path: dist/App_Mac.zip
