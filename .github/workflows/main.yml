name: Build macOS App (Intel x86_64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Runner veloce (Apple Silicon)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          # NOTA: Abbiamo rimosso "architecture: x64" da qui per evitare che l'azione si blocchi!

      - name: Install dependencies (Intel x86_64)
        run: |
          # Usiamo 'arch -x86_64' per forzare pip a scaricare le librerie Intel
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements.txt
          arch -x86_64 python -m pip install pyinstaller

      - name: Build with PyInstaller (Intel x86_64)
        run: |
          # Compiliamo il binario forzando l'emulazione Intel
          arch -x86_64 pyinstaller --onefile --windowed main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-executable
          path: dist/
