name: Compila App Mac (Catalina Retrocompatibile)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Sblocca i permessi per poter creare la Release pubblica
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"

    steps:
      # 1. Scarica il codice dal tuo repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Python 3.11
      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installa le librerie forzando l'architettura Intel (x86_64)
      - name: Installa dipendenze (Intel emulation)
        run: |
          arch -x86_64 python3 -m pip install --upgrade pip
          arch -x86_64 python3 -m pip install pyinstaller Pillow tkmacosx

      # 4. Compila l'applicazione forzando l'architettura Intel
      - name: Compila con PyInstaller (Intel target)
        run: |
          arch -x86_64 pyinstaller --noconfirm --onedir --windowed \
            --target-arch x86_64 \
            --add-data "modelli_magliette:modelli_magliette" \
            --name "Mockupper" \
            generatore_automatico_cuore.py

      # 5. Comprime l'applicazione .app in un archivio .zip
      - name: Comprime l'applicazione .app
        run: |
          cd dist
          zip -r ../Mockupper_Mac_Catalina.zip Mockupper.app

      # 6. Carica comunque il file negli Artifacts (di riserva)
      - name: Carica file finale (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Mockupper_Mac_Catalina
          path: Mockupper_Mac_Catalina.zip

      # 7. CREA LA RELEASE AUTOMATICA (Questo ti salverà la vita!)
      - name: Pubblica Release per il download diretto
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v3.0-${{ github.run_number }}"
          name: "Mockupper Pro v3.0 (Build ${{ github.run_number }})"
          draft: false
          prerelease: false
          files: Mockupper_Mac_Catalina.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
